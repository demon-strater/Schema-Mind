services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: schema_mind
      POSTGRES_PASSWORD: schema_mind_password
      POSTGRES_DB: schema_mind
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schema_mind -d schema_mind"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    env_file:
      - .env
    environment:
      PORT: "5000"
      DATABASE_URL: "postgresql://schema_mind:schema_mind_password@db:5432/schema_mind"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  db_data:
